      border: 2px solid #94a3b8;

    .card.flipped { transform: rotateY(180deg); }
    .card.slide-left { animation: slideLeft 180ms ease both; }
    .card.slide-right { animation: slideRight 180ms ease both; }

    @keyframes slideRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(32px); opacity: 0.3; } }

      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid #dbe3ef;
      box-shadow: var(--shadow);
      backface-visibility: hidden;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .front { padding: 18px; }
    .back { transform: rotateY(180deg); padding: 14px 14px 18px; }

      color: #0f3a8a;
      border-radius: 14px;

      font-weight: 900;
      text-align: left;
      width: 100%;
      word-break: break-word;

      color: #1e3a8a;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 14px;

      border-radius: 999px;
      padding: 6px 10px;

      font-weight: 700;

    .item { margin: 12px 0; }
    .label {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.3px;

    .example-en, .example-cn, .example-note { display: block; }
    .example-en { font-style: italic; }
    .example-cn, .example-note { font-style: normal; }
    .example-note { color: #334155; }

    #list-view { display: none; height: 100%; flex-direction: column; }
    .list-scroll { flex: 1; overflow: auto; padding: 12px; }
    .list-row {
      width: 100%;
      text-align: left;
      border: 1px solid #b7c7df;
      border-radius: 14px;
      background: #fff;
      padding: 14px 14px 12px;
      margin-bottom: 10px;

    .sheet {

      left: 0;
      right: 0;

    .sheet-head {

    @media (max-width: 640px) {
      .title { font-size: 17px; }

      .txt { font-size: 15px; }
    }

  <script>
    let coreData = [];

    function sanitizeHTML(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function splitSyllables(word) {
      const w = String(word || '').trim();
      if (!w) return '';
      if (w.length <= 3 || /[\s-]/.test(w)) return w;
      const lower = w.toLowerCase();
      const groups = [...lower.matchAll(/[aeiouy]+/g)].map(m => ({ start: m.index, end: m.index + m[0].length }));
      if (groups.length < 2) return w;
      const cuts = [];
      for (let i = 0; i < groups.length - 1; i++) {
        const left = groups[i];
        const right = groups[i + 1];
        const clusterStart = left.end;
        const clusterEnd = right.start;
        const cluster = lower.slice(clusterStart, clusterEnd);
        if (!cluster) {
          cuts.push(right.start);
          continue;
        }
        let cut = clusterStart;
        if (cluster.length === 1) {
          cut = clusterStart;
        } else if (cluster.length === 2) {
          const second = cluster[1];
          cut = (second === 'l' || second === 'r') ? clusterStart : (clusterStart + 1);
        } else {
          cut = clusterStart + 1;
        }
        if (cut > 0 && cut < w.length) cuts.push(cut);
      }
      const uniq = [...new Set(cuts)].filter(x => x > 0 && x < w.length);
      if (!uniq.length) return w;
      let out = '';
      let prev = 0;
      for (const cut of uniq.slice(0, 4)) {
        out += w.slice(prev, cut) + '·';
        prev = cut;
      }
      out += w.slice(prev);
      return out.replace(/·+/g, '·').replace(/^·|·$/g, '');
    }

    function toggleCardFlip() {
      const card = document.getElementById('main-card');
      card.classList.toggle('flipped');
      const it = curList[curIdx];
      if (it) speak(it.word);
    }

    function normalizeCoreFields(it) {
      const out = {
        meaning: String(it.meaning_cn || '').trim(),
        meaningEn: String(it.meaning_en || '').trim(),
        root: String(it.root_memory || '').trim(),
        phrases: Array.isArray(it.phrases) ? it.phrases : [],
        example: String(it.ielts_example || '').trim(),
      };
      const logicWord = /\*/.test(String(it.word || '')) || /雅思核心|并列关系|转折|因果/.test(out.meaning + out.root);
      if (logicWord) {
        out.meaning = out.meaning
          .replace(/[（(][^)）]*雅思[^)）]*[)）]/g, '')
          .replace(/[（(][^)）]*(并列|转折|因果|逻辑)[^)）]*[)）]/g, '')
          .trim();
        out.root = '（逻辑考点词，词根项不适用）';
      }
      if (!out.root) out.root = '（词根待校验）';
      if (!out.example) out.example = '（例句待校验）';
      return out;
    }

    function isPendingText(value) {
      return /待(补充|校验)/.test(String(value || ''));
    }

    function formatPhraseHTML(phrases) {
      const rawList = Array.isArray(phrases) ? phrases : [phrases];
      const lines = [];
      for (const raw of rawList) {
        const text = String(raw || '').trim();
        if (!text) continue;
        const parts = text.split(/[；;]/).map(s => s.trim()).filter(Boolean);
        if (!parts.length) continue;
        for (const part of parts) {
          if (!/[A-Za-z]/.test(part) && lines.length) {
            lines[lines.length - 1] = `${lines[lines.length - 1]} ${part}`.trim();
          } else {
            lines.push(part);
          }
        }
      }
      if (!lines.length) {
        return sanitizeHTML('（本词未标注）');
      }
      return `<div class="phrase-lines">${lines.map(line => `<div class="phrase-line">${sanitizeHTML(line)}</div>`).join('')}</div>`;
    }

    function formatExampleHTML(text) {
      const src = String(text || '').trim();
      if (!src) return sanitizeHTML('（例句待校验）');
      if (isPendingText(src)) return sanitizeHTML(src);
      const blocks = src
        .split('//')
        .map(s => s.trim())
        .filter(Boolean)
        .map(block => {
          const normalized = block.replace(/\s+/g, ' ').trim();
          const firstCn = normalized.search(/[\u4e00-\u9fff]/);
          let en = normalized;
          let cn = '';
          if (firstCn > 0) {
            en = normalized.slice(0, firstCn).trim();
            cn = normalized.slice(firstCn).trim();
          }
          if (!cn && /。|；/.test(en) && /[A-Za-z]/.test(en) && /[\u4e00-\u9fff]/.test(en)) {
            const m = en.match(/^(.*?[.!?])\s*(.*)$/);
            if (m && /[\u4e00-\u9fff]/.test(m[2] || '')) {
              en = m[1].trim();
              cn = m[2].trim();
            }
          }
          const parts = [];
          if (en) parts.push(`<span class="example-en">${sanitizeHTML(en)}</span>`);
          if (cn) parts.push(`<span class="example-cn">${sanitizeHTML(cn)}</span>`);
          if (!parts.length) parts.push(`<span>${sanitizeHTML(normalized)}</span>`);
          return `<div>${parts.join('')}</div>`;
        });
      return `<div class="example-lines">${blocks.join('')}</div>`;
    }

    function parseSynonyms(raw) {
      if (!raw) return [];
      const cleaned = String(raw).replaceAll('...', ' ').replaceAll('…', ' ').replaceAll('*', ' ');
      const parts = cleaned.split(/[;,，；]+/g).map(s => s.trim()).filter(Boolean);
      const seen = new Set();
      const out = [];
      for (const p of parts) {
        const x = p.replace(/\s+/g, ' ').trim();
        if (!x) continue;
        if (!/[A-Za-z]/.test(x)) continue;
        const k = x.toLowerCase();
        if (seen.has(k)) continue;
        seen.add(k);
        out.push(x);
      }
      return out;
    }

    function buildReplacementMapByWord() {
      replacementByWord = new Map();
      for (const r of replacementData) {
        replacementByWord.set(String(r.word || '').toLowerCase(), r);
      }
      coreByWord = new Map();
      for (const c of coreData) {
        coreByWord.set(String(c.word || '').toLowerCase(), c);
      }
    }

    async function loadDataSources() {
      if (window.__IELTS_DATA__ && Array.isArray(window.__IELTS_DATA__.core) && Array.isArray(window.__IELTS_DATA__.replacement)) {
        return window.__IELTS_DATA__;
      }
      const [coreRes, replRes, reportRes] = await Promise.all([
        fetch('./core_words.json', { cache: 'no-store' }),
        fetch('./replacement_words.json', { cache: 'no-store' }),
        fetch('./validation_report.json', { cache: 'no-store' }),
      ]);
      return {
        core: await coreRes.json(),
        replacement: await replRes.json(),
        report: await reportRes.json(),
      };
    }

    async function init() {
      try {
        const payload = await loadDataSources();
        coreData = payload.core;
        replacementData = payload.replacement;
        const report = payload.report || {};

        replacementMap = new Map(replacementData.map(r => [r.id, r]));
        buildReplacementMapByWord();
        curList = [...coreData];

        const hard = report.hard_check || {};
        const summary = `校验 core=${report.core_count} total=${report.total_words_by_count_rule} 对齐错误=${report.line_alignment_errors}`;
        document.getElementById('progress-sub').innerText = summary;
        if (!hard.core_equals_376 || !hard.count_rule_equals_538 || !hard.no_missing_fields || !hard.no_placeholders || !hard.line_alignment_zero) {
          document.getElementById('progress-sub').innerText = '数据校验未全绿，请先运行构建脚本修复';
        }

        bindEvents();
        initVoices();
        render();
        updateProgress();
      } catch (err) {
        document.getElementById('f-word').innerText = '数据加载失败';
        document.getElementById('progress-sub').innerText = '请确认 data_bundle.js 或 JSON 文件存在且同目录';
        console.error(err);
      }
    }

    function bindEvents() {
      document.getElementById('f-word').addEventListener('click', (e) => {
        e.stopPropagation();
        const it = curList[curIdx];
        if (it) speak(it.word);
      });

      document.getElementById('f-ipa').addEventListener('click', (e) => {
        e.stopPropagation();
        accent = accent === 'en-US' ? 'en-GB' : 'en-US';
        render();
      });

      document.getElementById('main-card').addEventListener('click', (e) => {
        if (e.target.closest('#f-word') || e.target.closest('#f-ipa') || e.target.closest('.chip-btn')) return;
        toggleCardFlip();
      });

      document.getElementById('prev-btn').addEventListener('click', () => navigate(-1, 'right'));
      document.getElementById('next-btn').addEventListener('click', () => navigate(1, 'left'));

      document.addEventListener('keydown', (e) => {
        if (viewMode !== 'card') return;
        if (e.key === 'ArrowRight') {
          e.preventDefault();
          navigate(1, 'left');
        }
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          navigate(-1, 'right');
        }
      }, { passive: false });

      document.addEventListener('wheel', (e) => {
        if (viewMode !== 'card') return;
        if (Math.abs(e.deltaY) < 16) return;
        if (wheelLock) return;
        wheelLock = true;
        setTimeout(() => { wheelLock = false; }, 170);
        e.preventDefault();
        if (e.deltaY > 0) navigate(1, 'left');
        else navigate(-1, 'right');
      }, { passive: false });

      document.addEventListener('touchstart', (e) => {
        if (viewMode !== 'card') return;
        touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        if (viewMode !== 'card') return;
        const endX = e.changedTouches[0].clientX;
        const delta = touchStartX - endX;
        if (delta > 46) navigate(1, 'left');
        if (delta < -46) navigate(-1, 'right');
      }, { passive: true });
    }

    function refreshVoicePool() {
      try {
        voicePool = window.speechSynthesis.getVoices() || [];
      } catch (_) {
        voicePool = [];
      }
      return voicePool;
    }

    function initVoices() {
      refreshVoicePool();
      const delayedRefresh = () => {
        setTimeout(refreshVoicePool, 0);
        setTimeout(refreshVoicePool, 250);
        setTimeout(refreshVoicePool, 1000);
      };
      delayedRefresh();
      if (window.speechSynthesis && typeof window.speechSynthesis.addEventListener === 'function') {
        window.speechSynthesis.addEventListener('voiceschanged', refreshVoicePool);
      } else if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = refreshVoicePool;
      }
    }

    function pickVoice() {
      const voices = voicePool.length ? voicePool : refreshVoicePool();
      if (!voices.length) return null;

      const targetLang = accent === 'en-GB' ? 'en-gb' : 'en-us';
      const normalized = voices.map(v => ({
        raw: v,
        name: String(v.name || '').toLowerCase(),
        lang: String(v.lang || '').toLowerCase()
      }));

      const byLang = normalized.filter(v => v.lang.startsWith(targetLang));
      const nonCompactByLang = byLang.filter(v => !v.name.includes('compact'));
      const anyEnglish = normalized.filter(v => v.lang.startsWith('en'));
      const nonCompactEnglish = anyEnglish.filter(v => !v.name.includes('compact'));

      if (targetLang === 'en-us') {
        const samantha = normalized.find(v => v.name === 'samantha');
        if (samantha) return samantha.raw;
      }

      const preferred =
        nonCompactByLang.find(v => v.name.includes('samantha')) ||
        nonCompactByLang.find(v => v.name.includes('siri') || v.name.includes('enhanced') || v.name.includes('premium')) ||
        nonCompactByLang[0] ||
        nonCompactEnglish.find(v => v.name.includes('samantha')) ||
        nonCompactEnglish.find(v => v.lang.startsWith('en-us')) ||
        nonCompactEnglish[0] ||
        byLang[0] ||
        anyEnglish[0] ||
        normalized[0];

      return preferred ? preferred.raw : null;
    }

    function speak(text) {
      if (!text) return;
      try {
        refreshVoicePool();
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = accent;
        utter.rate = 0.9;
        utter.pitch = 1;
        const voice = pickVoice();
        if (voice) utter.voice = voice;
        window.speechSynthesis.speak(utter);
      } catch (err) {
        console.warn('speak failed', err);
      }
    }

    function navigate(step, dir) {
      if (!curList.length) return;
      const target = curIdx + step;
      if (target < 0 || target >= curList.length) return;
      const card = document.getElementById('main-card');
      card.classList.remove('flipped');
      card.classList.add(dir === 'left' ? 'slide-left' : 'slide-right');
      setTimeout(() => {
        card.classList.remove('slide-left', 'slide-right');
        curIdx = target;
        render();
        updateProgress();
      }, 165);
    }

    function render() {
      const it = curList[curIdx];
      if (!it) return;

      document.getElementById('f-cat').innerText = it.category || 'IELTS';
      document.getElementById('f-word').innerText = it.word;
      const ipa = accent === 'en-US' ? it.ipa_us : it.ipa_uk;
      document.getElementById('f-ipa').innerText = `${ipa} [${accent === 'en-US' ? 'US' : 'UK'}]`;

      const replWords = parseSynonyms(it.synonym_raw);
      renderReplacementChips('f-repl', replWords, it);

      const coreView = normalizeCoreFields(it);
      const phraseHtml = formatPhraseHTML(coreView.phrases || []);
      const exampleHtml = formatExampleHTML(coreView.example);
      const syllables = splitSyllables(it.word);
      const backHtml = `
        <div class="item">
          <span class="label l1">原单词 / 音节 / 音标</span>
          <div class="txt">
            <b>${sanitizeHTML(it.word)}</b><br/>
            ${sanitizeHTML(syllables)}<br/>
            US: ${sanitizeHTML(it.ipa_us || '')} ｜ UK: ${sanitizeHTML(it.ipa_uk || '')}
          </div>
        </div>
        <div class="item"><span class="label l1">核心中文含义</span><div class="txt">${sanitizeHTML(coreView.meaning || '（释义待校验）')}</div></div>
        <div class="item"><span class="label l2">词根记忆</span><div class="txt">${sanitizeHTML(coreView.root)}</div></div>
        <div class="item"><span class="label l3">高频词组</span><div class="txt">${phraseHtml}</div></div>
        <div class="item"><span class="label l4">雅思真题例句</span><div class="txt example">${exampleHtml}</div></div>
        <div class="item">
          <span class="label l5">替换 / 命题词</span>
          <div class="chips" id="b-repl"></div>
        </div>
      `;
      document.getElementById('b-content').innerHTML = backHtml;
      renderReplacementChips('b-repl', replWords, it);

      speak(it.word);
    }

    function renderReplacementChips(containerId, words, coreItem) {
      const el = document.getElementById(containerId);
      if (!el) return;
      if (!words.length) {
        el.innerHTML = '<span class="chip-btn" aria-disabled="true">暂无</span>';
        return;
      }
      el.innerHTML = words.map(w => (
        `<button class="chip-btn" data-word="${sanitizeHTML(w)}" aria-label="查看 ${sanitizeHTML(w)} 详情">${sanitizeHTML(w)}</button>`
      )).join('');
      el.querySelectorAll('.chip-btn[data-word]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const word = btn.getAttribute('data-word') || '';
          openSheet(word, coreItem);
        });
      });
    }

    function getReplacementDetail(word, coreItem) {
      const wl = String(word || '').toLowerCase();
      const coreHit = coreByWord.get(wl);
      if (coreHit) {
        return {
          word: coreHit.word,
          ipa_us: coreHit.ipa_us || '',
          ipa_uk: coreHit.ipa_uk || '',
          meaning_cn: coreHit.meaning_cn || '',
          meaning_en: coreHit.meaning_en || '',
          root_memory: coreHit.root_memory || '（词根待补充）',
          phrases: coreHit.phrases || [],
          ielts_example: coreHit.ielts_example || '',
          source: 'core'
        };
      }

      const repl = replacementByWord.get(wl);
      if (repl) {
        const refs = Array.isArray(repl.source_refs) ? repl.source_refs : [];
        const hasDict = refs.some(x => x && x.type === 'dictionaryapi');
        const mean = String(repl.meaning_cn || '').replace(/^与主词.*?关系[；;]?/g, '').trim() || '（释义待校验）';
        const root = String(repl.root_memory || '');
        return {
          word: repl.word || word,
          ipa_us: repl.ipa_us || '',
          ipa_uk: repl.ipa_uk || '',
          meaning_cn: mean,
          meaning_en: repl.meaning_en || '（英文释义待校验）',
          root_memory: hasDict ? (root || '（词根待校验）') : '（词根待校验，避免误导）',
          phrases: hasDict ? (repl.phrases || []) : [],
          ielts_example: hasDict ? (repl.ielts_example || '') : '',
          source: 'replacement'
        };
      }

      return {
        word,
        ipa_us: '',
        ipa_uk: '',
        meaning_cn: '（中文释义待校验）',
        meaning_en: '（英文释义待校验）',
        root_memory: '（词根待校验，避免误导）',
        phrases: [],
        ielts_example: '',
        source: 'fallback'
      };
    }

    async function fetchOnlineDetail(word) {
      const key = String(word || '').toLowerCase();
      if (onlineDetailCache.has(key)) return onlineDetailCache.get(key);
      const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`;
      const resp = await fetch(url, { cache: 'no-store' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const arr = await resp.json();
      if (!Array.isArray(arr) || !arr.length) throw new Error('empty data');
      const entry = arr[0];
      const phon = Array.isArray(entry.phonetics) ? entry.phonetics : [];
      const ipa = phon.find(p => p && p.text)?.text || '';
      let def = '';
      let ex = '';
      for (const m of (entry.meanings || [])) {
        for (const d of (m.definitions || [])) {
          if (!def && d.definition) def = d.definition;
          if (!ex && d.example) ex = d.example;
        }
      }
      const data = { ipa, def, ex };
      onlineDetailCache.set(key, data);
      return data;
    }

    async function openSheet(word, coreItem) {
      const item = getReplacementDetail(word, coreItem);
      document.getElementById('sheet-title').innerText = `${item.word}（替换/命题词）`;
      const phraseHtml = formatPhraseHTML(item.phrases || []);
      const exampleHtml = formatExampleHTML(item.ielts_example);
      document.getElementById('sheet-body').innerHTML = `
        <div class="item"><span class="label l1">音标</span><div class="txt">US: ${sanitizeHTML(item.ipa_us)}<br/>UK: ${sanitizeHTML(item.ipa_uk)}</div></div>
        <div class="item"><span class="label l2">中文含义</span><div class="txt">${sanitizeHTML(item.meaning_cn || '（中文释义待校验）')}</div></div>
        <div class="item"><span class="label l2">英文释义</span><div class="txt">${sanitizeHTML(item.meaning_en || '（英文释义待校验）')}</div></div>
        <div class="item"><span class="label l3">词根记忆</span><div class="txt">${sanitizeHTML(item.root_memory)}</div></div>
        <div class="item"><span class="label l4">高频词组</span><div class="txt">${phraseHtml}</div></div>
        <div class="item"><span class="label l5">雅思真题例句</span><div class="txt example">${exampleHtml}</div></div>
      `;
      document.getElementById('modal-mask').classList.add('show');
      document.getElementById('bottom-sheet').classList.add('show');
      speak(item.word);

      if ((!item.ipa_us && !item.ipa_uk) || isPendingText(item.ipa_us) || isPendingText(item.ipa_uk) || isPendingText(item.meaning_en) || isPendingText(item.root_memory)) {
        try {
          const online = await fetchOnlineDetail(item.word);
          const us = (!item.ipa_us || isPendingText(item.ipa_us)) ? (online.ipa || item.ipa_us) : item.ipa_us;
          const uk = (!item.ipa_uk || isPendingText(item.ipa_uk)) ? (online.ipa || item.ipa_uk) : item.ipa_uk;
          const meanCn = item.meaning_cn || '（中文释义待校验）';
          const meanEn = isPendingText(item.meaning_en) ? (online.def || item.meaning_en) : item.meaning_en;
          const ex = item.ielts_example || online.ex || '';
          const onlinePhraseHtml = formatPhraseHTML(item.phrases || []);
          const onlineExampleHtml = formatExampleHTML(ex);
          document.getElementById('sheet-body').innerHTML = `
            <div class="item"><span class="label l1">音标</span><div class="txt">US: ${sanitizeHTML(us)}<br/>UK: ${sanitizeHTML(uk)}</div></div>
            <div class="item"><span class="label l2">中文含义</span><div class="txt">${sanitizeHTML(meanCn)}</div></div>
            <div class="item"><span class="label l2">英文释义</span><div class="txt">${sanitizeHTML(meanEn || '（英文释义待校验）')}</div></div>
            <div class="item"><span class="label l3">词根记忆</span><div class="txt">${sanitizeHTML(item.root_memory)}</div></div>
            <div class="item"><span class="label l4">高频词组</span><div class="txt">${onlinePhraseHtml}</div></div>
            <div class="item"><span class="label l5">雅思真题例句</span><div class="txt example">${onlineExampleHtml}</div></div>
          `;
        } catch (_) {
          // offline fallback
        }
      }
    }

    function closeSheet() {
      document.getElementById('modal-mask').classList.remove('show');
      document.getElementById('bottom-sheet').classList.remove('show');
    }

    function switchView(mode) {
      viewMode = mode;
      document.getElementById('card-view').style.display = mode === 'card' ? 'flex' : 'none';
      document.getElementById('list-view').style.display = mode === 'list' ? 'flex' : 'none';
      document.getElementById('main-footer').style.display = mode === 'card' ? 'flex' : 'none';
      document.getElementById('tab-card').classList.toggle('active', mode === 'card');
      document.getElementById('tab-list').classList.toggle('active', mode === 'list');
      if (mode === 'list') {
        listPage = Math.floor(curIdx / perPage);
        renderList();
      }
    }

    function renderList() {
      const start = listPage * perPage;
      const items = curList.slice(start, start + perPage);
      const host = document.getElementById('list-items');
      host.innerHTML = items.map((it, i) => {
        const replPreview = parseSynonyms(it.synonym_raw).join(', ');
        return `
          <button class="list-row" onclick="jumpTo(${start + i})" aria-label="打开 ${sanitizeHTML(it.word)}">
            <div class="list-word">${sanitizeHTML(it.word)}</div>
            <div class="list-mean">${sanitizeHTML(it.meaning_cn || '（中文释义待校验）')}</div>
            <div class="list-syn">替换词: ${sanitizeHTML(replPreview || '暂无')}</div>
          </button>
        `;
      }).join('');
      document.getElementById('page-num').innerText = `${listPage + 1} / ${Math.max(1, Math.ceil(curList.length / perPage))}`;
      host.scrollTop = 0;
    }

    function jumpTo(idx) {
      curIdx = idx;
      switchView('card');
      render();
      updateProgress();
    }

    function changePage(step) {
      const max = Math.ceil(curList.length / perPage);
      const next = listPage + step;
      if (next < 0 || next >= max) return;
      listPage = next;
      renderList();
    }

    function onSearch() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      if (!q) {
        curList = [...coreData];
      } else {
        curList = coreData.filter(it => {
          const base = [it.word, it.meaning_cn, it.meaning_en, it.root_memory, it.synonym_raw].join(' ').toLowerCase();
          if (base.includes(q)) return true;
          const replWords = parseSynonyms(it.synonym_raw).join(' ').toLowerCase();
          return replWords.includes(q);
        });
      }
      curIdx = 0;
      listPage = 0;
      if (viewMode === 'card') render(); else renderList();
      updateProgress();
    }

    function updateProgress() {
      const total = curList.length;
      const shown = total ? curIdx + 1 : 0;
      document.getElementById('progress').innerText = `${shown} / ${total}`;
    }

    init();
  </script>
</body>
